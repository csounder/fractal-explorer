<!doctype html>
<!--
  FRACTAL MUSIC SYSTEM - CSOUND WASM INTEGRATION DEMO
  VERSION: 2026-03-13-REALTIME
  
  === HOW TO RUN ===
  Open directly in browser from file:// - uses dynamic import which works in modern browsers.
  Uses @csound/browser@7.0.0-beta26 (Csound WASM 7).
  
  === OVERVIEW ===
  This application demonstrates best practices for integrating Csound into web applications:
  
  1. CSOUND WASM INITIALIZATION (@csound/browser v7)
     - Load Csound as ES module from CDN
     - Set audio options and compile orchestra on startup
     - Start always-running effect instruments (reverb, ambisonic decoder)
  
  2. JAVASCRIPT ↔ CSOUND COMMUNICATION
     - Control channels (chnget/chnset) for global parameters (reverb room size, wet mix)
     - Score events via inputMessage() for real-time note scheduling
     - JavaScript handles L-system generation and visualization
     - Csound handles ALL audio synthesis and spatialization
  
  3. ADVANCED CSOUND FEATURES DEMONSTRATED
     - freeverb: Schroeder-Moorer reverb with configurable room size
     - hrtfmove2: HRTF binaural spatialization (requires HRTF data files)
     - bformenc1: First-order ambisonic encoding (W,X,Y,Z B-format)
     - Multiple synthesis techniques: additive, FM, FOF, Karplus-Strong, waveshaping
     - Dynamic envelope control (attack/release) via p-fields
     - Brightness filtering with tonex (multi-pole lowpass)
  
  4. ARCHITECTURE
     - Instr 1: Universal note synthesizer (10 presets, 3 spatialization modes)
     - Instr 998: Ambisonic decoder (B-format → stereo)
     - Instr 999: Global freeverb reverb processor
     - Global audio buses for reverb sends and ambisonic mixing
  
  Author: Demonstration for "The Csound Book" integration research
-->

  </head>
  <body data-theme="green">

            Show Info</label
          >
          <div
            id="debugConsole"
            style="
              background: #000;
              color: #0f0;
              font-size: 9px;
              height: 120px;
              overflow-y: auto;

      <div id="footer">
        <div id="status">Loading Csound WASM...</div>
        <div class="btn-group" style="margin: 0">
          <button id="playBtn" onclick="play()" disabled>Play</button>
          <button id="stopBtn" onclick="stop()">Stop</button>
          <button id="exportCsdBtn" onclick="exportCSD()" disabled style="background: linear-gradient(135deg, #667eea, #764ba2); box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);">💾 Export CSD</button>
        </div>

    </div>

    <!-- CSD Output Console -->
    <textarea id="csdOutput" readonly style="position: fixed; bottom: 20px; right: 20px; width: 600px; height: 450px; background: rgba(10, 10, 30, 0.95); color: #00ff88; border: 2px solid #00ff88; border-radius: 8px; padding: 15px; font-family: 'Monaco', monospace; font-size: 11px; display: none; resize: both; overflow: auto; z-index: 1000; box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);"></textarea>
    <script>
      let csound = null;
      let isPlaying = false;
      let paths = [];
      let csoundReady = false;
      let playbackTimeoutId = null;
      let orchestraCode = ""; // Store orchestra for recompilation
      let scheduledTimeouts = []; // Track all scheduled note timeouts
      let currentNoteIndex = -1; // Current playing note index
      let selectedPathsGlobal = []; // Selected paths for playback visualization
      let visualizationInterval = null; // Canvas update interval

      const presets = {
        algae: { axiom: "F", rules: "F=F[+F]F[-F]F", angle: 25, iterations: 4 },
        tree: {
          axiom: "F",
          rules: "F=FF+[+F-F-F]-[-F+F+F]",
          angle: 22,
          iterations: 4,
        },
        dragon: {
          axiom: "F",
          rules: "F=F+G\nG=F-G",
          angle: 90,
          iterations: 10,
        },
        koch: {
          axiom: "F++F++F",
          rules: "F=F-F++F-F",
          angle: 60,
          iterations: 4,
        },
        sierpinski: {
          axiom: "F-G-G",
          rules: "F=F-G+F+G-F\nG=GG",
          angle: 120,
          iterations: 5,
        },
      };

      // Debug console
      function debugLog(msg) {
        const debugConsole = document.getElementById("debugConsole");
        const showDebug = document.getElementById("showDebug");
        if (debugConsole && showDebug && showDebug.checked) {
          debugConsole.style.display = "block";
          const time = new Date().toLocaleTimeString();
          debugConsole.innerHTML += `[${time}] ${msg}<br>`;
          debugConsole.scrollTop = debugConsole.scrollHeight;
        }
        console.log(msg);
      }

      window.toggleDebugConsole = function () {
        const debugConsole = document.getElementById("debugConsole");
        const showDebug = document.getElementById("showDebug");
        if (debugConsole && showDebug) {
          debugConsole.style.display = showDebug.checked ? "block" : "none";
          if (showDebug.checked) debugLog("Debug console enabled");
        }
      };

      // Initialize Csound WASM 7 (same pattern as Weather Sonification)
      async function initCsound() {
        try {
          debugLog(
            "Loading Csound WASM 7 from @csound/browser@7.0.0-beta26...",
          );

          const { Csound } = await import(
            "https://cdn.jsdelivr.net/npm/@csound/browser@7.0.0-beta26/dist/csound.js"
          );

          debugLog("Creating Csound instance...");
          csound = await Csound({
            useWorker: false,
            useSPN: false,
            outputChannelCount: 2,
          });
          debugLog("Csound WASM instance created");

          // Csound orchestra with all instruments
          orchestraCode = `
      sr = 44100
      ksmps = 32
      nchnls = 2
      0dbfs = 1

      ; Global reverb sends
      gaRvbL init 0
      gaRvbR init 0

      ; Global ambisonic buses (B-format: W, X, Y, Z)
      gaAmbiW init 0
      gaAmbiX init 0
      gaAmbiY init 0
      gaAmbiZ init 0

      ; Panic button - set global stop flag
      instr 997
        chnset 1, "stopAll"
        turnoff2 1, 0, 0.01  ; Turn off all instances of instrument 1 with 10ms release
      endin

      ; Ambisonic decoder to stereo
      instr 998
        ; First-order ambisonic decode to stereo
        ; Simple stereo decode: L = W + X, R = W - X
        aL = gaAmbiW + 0.707*gaAmbiX
        aR = gaAmbiW - 0.707*gaAmbiX

        ; Send to reverb
        gaRvbL += aL
        gaRvbR += aR

        clear gaAmbiW, gaAmbiX, gaAmbiY, gaAmbiZ
      endin

      ; Freeverb stereo reverb (master output)
      instr 999
        kRoomSize chnget "roomSize"
        kWet chnget "reverbWet"
        kMasterVol chnget "masterVolume"

        ; Apply freeverb to accumulated signals
        aRvbL, aRvbR freeverb gaRvbL, gaRvbR, kRoomSize, 0.5

        ; Mix dry/wet
        aOutL = gaRvbL*(1-kWet) + aRvbL*kWet
        aOutR = gaRvbR*(1-kWet) + aRvbR*kWet

        ; Apply master volume
        aOutL = aOutL * kMasterVol
        aOutR = aOutR * kMasterVol

        out aOutL, aOutR

        clear gaRvbL, gaRvbR
      endin

      ; Global control channels for real-time parameter control
      chnset 0.01, "globalAttack"
      chnset 0.1, "globalRelease"
      chnset 0.75, "roomSize"
      chnset 0.45, "reverbWet"
      chnset 0.7, "masterVolume"
      chnset 0, "stopAll"

      ; Universal note instrument
      instr 1
        iFreq = p4
        iAmp = p5
        iPreset = p6
        iBright = p7
        iPan = p8        ; 0-1 for stereo pan, or azimuth control
        iPanType = p9    ; 0=stereo, 2=ambisonic
        iAtkP = p10      ; attack time (if < 0, use global)
        iRelP = p11      ; release time (if < 0, use global)

        ; Check stop flag every k-cycle and turnoff if set
        kStopFlag = chnget:k("stopAll")
        if kStopFlag == 1 then
          turnoff
        endif

        ; Get attack/release - use p-field if >= 0, else use global channel
        if (iAtkP >= 0) then
          iAtk = iAtkP
        else
          iAtk = i(chnget:k("globalAttack"))
        endif
        if (iRelP >= 0) then
          iRel = iRelP
        else
          iRel = i(chnget:k("globalRelease"))
        endif

        ; Envelope with attack and release
        aEnv linsegr 0, iAtk, iAmp, iRel, 0

        ; === SYNTHESIS BASED ON PRESET ===
        if (iPreset == 0) then
          ; Sine wave
          aSig oscili aEnv, iFreq, -1, 0

        elseif (iPreset == 1) then
          ; Sawtooth (vco2 type 0 = sawtooth)
          kAmp = k(aEnv)
          aSig vco2 kAmp, iFreq, 0

        elseif (iPreset == 2) then
          ; Pluck (Karplus-Strong)
          kAmp = k(aEnv)
          aSig pluck kAmp, iFreq, iFreq, 0, 1

        elseif (iPreset == 3) then
          ; FM Bell
          kModIdx = 2 + iBright*4
          aSig foscili aEnv, iFreq, 1, 2.5, kModIdx, -1

        elseif (iPreset == 4) then
          ; Additive Bell (inharmonic partials)
          a1 oscili aEnv, iFreq, -1, 0
          a2 oscili aEnv*0.5, iFreq*2.76, -1, 0
          a3 oscili aEnv*0.3*iBright, iFreq*5.4, -1, 0
          a4 oscili aEnv*0.2*iBright, iFreq*8.93, -1, 0
          aSig = (a1 + a2 + a3 + a4) * 0.4

        elseif (iPreset == 5) then
          ; Clarinet (odd harmonics only)
          a1 oscili aEnv, iFreq, -1, 0
          a2 oscili aEnv*0.3*iBright, iFreq*3, -1, 0
          a3 oscili aEnv*0.15*iBright, iFreq*5, -1, 0
          aSig = (a1 + a2 + a3) * 0.5

        elseif (iPreset == 6) then
          ; Wood percussion (filtered noise)
          kAmp = k(aEnv)
          aSig noise kAmp*2, 0
          kCf = iFreq*(1 + iBright*2)
          aSig butterbp aSig, kCf, kCf*0.1

        elseif (iPreset == 7) then
          ; Warm Pad (detuned saws)
          kAmp = k(aEnv)
          a1 vco2 kAmp*0.3, iFreq*0.99, 0
          a2 vco2 kAmp*0.3, iFreq, 0
          a3 vco2 kAmp*0.3, iFreq*1.01, 0
          aSig = a1 + a2 + a3

        elseif (iPreset == 8) then
          ; Drawbar Organ
          a1 oscili aEnv*0.3, iFreq, -1, 0
          a2 oscili aEnv*0.3, iFreq*2, -1, 0
          a3 oscili aEnv*0.2*iBright, iFreq*3, -1, 0
          a4 oscili aEnv*0.15*iBright, iFreq*4, -1, 0
          aSig = (a1 + a2 + a3 + a4) * 0.4

        elseif (iPreset == 9) then
          ; FOF Vocal synthesis (formant-like)
          ; Fallback: use filtered buzz if fof not available
          kAmp = k(aEnv)
          aSig buzz kAmp, iFreq, 20, -1
          kFormant = iFreq*(2 + iBright*3)
          aSig butterbp aSig, kFormant, kFormant*0.1

        else
          aSig = 0
        endif

        ; Brightness filtering (multi-pole lowpass)
        kCutoff = 500 + iBright*3000
        aSig tone aSig, kCutoff
        aSig tone aSig, kCutoff

        ; === SPATIALIZATION ===
        if (iPanType == 0) then
          ; Simple stereo panning
          aL, aR pan2 aSig, iPan
          gaRvbL += aL
          gaRvbR += aR

        elseif (iPanType == 1) then
          ; HRTF binaural spatialization - FALLBACK to enhanced stereo
          ; (hrtfmove2 requires external .dat files not available in browser)
          ; Use stereo panning with slight delay for pseudo-binaural effect
          aL, aR pan2 aSig, iPan

          ; Add slight cross-delay for spatial enhancement
          aDelL delay aL, 0.001
          aDelR delay aR, 0.001
          gaRvbL += aL*0.7 + aDelR*0.3
          gaRvbR += aR*0.7 + aDelL*0.3

        elseif (iPanType == 2) then
          ; First-order ambisonic encoding
          ; Convert pan (0-1) to azimuth (0-360 degrees)
          iAzim = iPan * 360
          iElev = 0
          iDist = 1.0

          ; Encode to B-format (W, X, Y, Z)
          aW, aX, aY, aZ bformenc1 aSig, iAzim, iElev

          ; Accumulate to global ambisonic buses
          gaAmbiW += aW
          gaAmbiX += aX
          gaAmbiY += aY
          gaAmbiZ += aZ
        endif
      endin

      ; ========================================================================
      ; GRANULAR SYNTHESIS INSTRUMENT (Textural)
      ; p4=freq, p5=amp, p6=density, p7=grainSize, p8=pitchVar, p9=texture, p10=pan, p11=panType, p12=atk, p13=rel
      ; ========================================================================
      instr 2
        iFreq = p4
        iAmp = p5
        iDensity = p6      ; grains per second
        iGrainSize = p7    ; grain duration in seconds
        iPitchVar = p8     ; pitch variation range (0-1)
        iTexture = p9      ; noise mix (0=tone, 1=noise)
        iPan = p10
        iPanType = p11
        iAtkP = p12        ; attack time (if < 0, use global)
        iRelP = p13        ; release time (if < 0, use global)

        kStopFlag = chnget:k("stopAll")
        if kStopFlag == 1 then
          turnoff
        endif

        ; Get attack/release - use p-field if >= 0, else use global channel
        if (iAtkP >= 0) then
          iAtk = iAtkP
        else
          iAtk = i(chnget:k("globalAttack"))
        endif
        if (iRelP >= 0) then
          iRel = iRelP
        else
          iRel = i(chnget:k("globalRelease"))
        endif
        aEnv linsegr 0, iAtk, iAmp, iRel, 0

        ; Grain trigger - random grain onset times
        kTrig metro iDensity

        ; Random pitch variation per grain
        kPitchRand randomi 1-iPitchVar, 1+iPitchVar, iDensity*0.3
        kGrainFreq = iFreq * kPitchRand

        ; Grain envelope (Gaussian-like)
        aGrainEnv linseg 0, iGrainSize*0.3, 1, iGrainSize*0.4, 1, iGrainSize*0.3, 0

        ; Grain source - blend between tone and noise based on texture
        aTone oscili 1, kGrainFreq, -1
        aNoise noise 1, 0
        aSource = aTone*(1-iTexture) + aNoise*iTexture

        ; Apply grain envelope when triggered
        aSig = aSource * aGrainEnv * aEnv * ampdb(-6)

        ; Spatialization
        if (iPanType == 0) then
          aL, aR pan2 aSig, iPan
          gaRvbL += aL
          gaRvbR += aR
        elseif (iPanType == 2) then
          iAzim = iPan * 360
          aW, aX, aY, aZ bformenc1 aSig, iAzim, 0
          gaAmbiW += aW
          gaAmbiX += aX
          gaAmbiY += aY
          gaAmbiZ += aZ
        endif
      endin

      ; ========================================================================
      ; COMPLEX FM INSTRUMENT (4 Operators)
      ; p4=freq, p5=amp, p6=modIndex, p7=algorithm(0-3), p8=carrierRatio, p9=opMix, p10=pan, p11=panType, p12=atk, p13=rel
      ; ========================================================================
      instr 3
        iFreq = p4
        iAmp = p5
        iModIndex = p6     ; modulation index
        iAlgo = p7         ; 0=parallel, 1=cascade, 2=stack, 3=complex
        iCarrierRatio = p8 ; carrier harmonic shift
        iOpMix = p9        ; operator balance (0-1)
        iPan = p10
        iPanType = p11
        iAtkP = p12        ; attack time (if < 0, use global)
        iRelP = p13        ; release time (if < 0, use global)

        kStopFlag = chnget:k("stopAll")
        if kStopFlag == 1 then
          turnoff
        endif

        ; Get attack/release - use p-field if >= 0, else use global channel
        if (iAtkP >= 0) then
          iAtk = iAtkP
        else
          iAtk = i(chnget:k("globalAttack"))
        endif
        if (iRelP >= 0) then
          iRel = iRelP
        else
          iRel = i(chnget:k("globalRelease"))
        endif
        aEnv linsegr 0, iAtk, iAmp, iRel, 0

        ; 4 Operators with different frequency ratios
        iRatio1 = 1 * iCarrierRatio
        iRatio2 = 2.76 * iCarrierRatio
        iRatio3 = 5.4 * iCarrierRatio
        iRatio4 = 8.93 * iCarrierRatio

        ; Clamp modulation index to safe range
        iModSafe = limit(iModIndex, 0.1, 4)

        ; Algorithm routing
        if (iAlgo == 0) then
          ; PARALLEL: All carriers, no modulation between ops
          aOp1 oscili aEnv, iFreq*iRatio1, -1
          aOp2 oscili aEnv, iFreq*iRatio2, -1
          aOp3 oscili aEnv, iFreq*iRatio3, -1
          aOp4 oscili aEnv, iFreq*iRatio4, -1
          aSig = (aOp1 + aOp2*iOpMix + aOp3*iOpMix*0.7 + aOp4*iOpMix*0.5) * 0.3

        elseif (iAlgo == 1) then
          ; CASCADE: Op4 → Op3 → Op2 → Op1 (simple FM chain, no feedback)
          aSig foscili aEnv, iFreq*iRatio1, iRatio2/iRatio1, iRatio3/iRatio2, iModSafe, -1

        elseif (iAlgo == 2) then
          ; STACK: Two parallel FM pairs
          aOp2 foscili aEnv*0.5, iFreq*iRatio2, 1, iRatio1/iRatio2, iModSafe, -1
          aOp4 foscili aEnv*0.5, iFreq*iRatio4, 1, iRatio3/iRatio4, iModSafe, -1
          aSig = (aOp2 + aOp4*iOpMix)

        else
          ; COMPLEX: Multiple modulators with safe scaling
          ; Op1 and Op4 are simple carriers
          aOp1 oscili aEnv*0.4, iFreq*iRatio1, -1
          aOp4 oscili aEnv*0.4, iFreq*iRatio4, -1
          ; Op2 modulates Op3
          aOp3 foscili aEnv*0.5, iFreq*iRatio3, 1, iRatio2/iRatio3, iModSafe, -1
          ; Mix all
          aSig = (aOp1 + aOp3*iOpMix + aOp4*(1-iOpMix))
        endif

        ; Soft clipping to prevent overload
        aSig tanh aSig*0.8
        aSig *= ampdb(-6)

        ; Spatialization
        if (iPanType == 0) then
          aL, aR pan2 aSig, iPan
          gaRvbL += aL
          gaRvbR += aR
        elseif (iPanType == 2) then
          iAzim = iPan * 360
          aW, aX, aY, aZ bformenc1 aSig, iAzim, 0
          gaAmbiW += aW
          gaAmbiX += aX
          gaAmbiY += aY
          gaAmbiZ += aZ
        endif
      endin

      ; ========================================================================
      ; NOISE & FILTERS INSTRUMENT (Textural)
      ; p4=baseFreq, p5=amp, p6=noiseColor, p7=filterType, p8=filterFreq, p9=resonance, p10=modRate, p11=pan, p12=panType, p13=atk, p14=rel
      ; ========================================================================
      instr 4
        iBaseFreq = p4
        iAmp = p5
        iNoiseColor = p6   ; 0=white, 0.5=pink, 1=brown
        iFilterType = p7   ; 0=LP, 1=BP, 2=HP
        iFilterFreq = p8   ; center frequency
        iResonance = p9    ; Q factor (1-20)
        iModRate = p10     ; LFO modulation rate
        iPan = p11
        iPanType = p12
        iAtkP = p13        ; attack time (if < 0, use global)
        iRelP = p14        ; release time (if < 0, use global)

        kStopFlag = chnget:k("stopAll")
        if kStopFlag == 1 then
          turnoff
        endif

        ; Get attack/release - use p-field if >= 0, else use global channel
        if (iAtkP >= 0) then
          iAtk = iAtkP
        else
          iAtk = i(chnget:k("globalAttack"))
        endif
        if (iRelP >= 0) then
          iRel = iRelP
        else
          iRel = i(chnget:k("globalRelease"))
        endif
        aEnv linsegr 0, iAtk, iAmp, iRel, 0

        ; Colored noise generation
        aNoise noise 1, 0
        if (iNoiseColor > 0.3) then
          ; Pink noise (1/f) - lowpass filter white noise
          aNoise tone aNoise, 3000
          aNoise tone aNoise, 3000
        endif
        if (iNoiseColor > 0.7) then
          ; Brown noise (1/f²) - further filtering
          aNoise tone aNoise, 1000
          aNoise tone aNoise, 1000
        endif

        ; LFO for filter modulation (clamp to safe range)
        kModRateSafe = limit(iModRate, 0, 5)
        kLFO oscili iFilterFreq*0.2, kModRateSafe, -1
        kCenterFreq = limit(iFilterFreq + kLFO, 100, 8000)

        ; Clamp resonance to VERY safe range (Q max 5 to prevent explosion)
        iResSafe = limit(iResonance, 0.5, 5)

        ; Multi-filter with SAFE resonance
        aSig = aNoise * aEnv
        if (iFilterType < 0.5) then
          ; Lowpass - moogladder resonance scaled way down
          aSig moogladder aSig, kCenterFreq, limit(iResSafe*0.01, 0, 0.05)
        elseif (iFilterType < 1.5) then
          ; Bandpass - keep bandwidth wide to prevent blowup
          kBW = limit(kCenterFreq / max(iResSafe, 0.5), 50, kCenterFreq*0.8)
          aSig butterbp aSig, kCenterFreq, kBW
        else
          ; Highpass - simple 2-pole
          aSig butterhp aSig, kCenterFreq
        endif

        ; Hard limiting to prevent any overflow
        aSig limit aSig*0.6, -0.95, 0.95
        aSig *= ampdb(-3)

        ; Spatialization
        if (iPanType == 0) then
          aL, aR pan2 aSig, iPan
          gaRvbL += aL
          gaRvbR += aR
        elseif (iPanType == 2) then
          iAzim = iPan * 360
          aW, aX, aY, aZ bformenc1 aSig, iAzim, 0
          gaAmbiW += aW
          gaAmbiX += aX
          gaAmbiY += aY
          gaAmbiZ += aZ
        endif
      endin
      `;

          debugLog(

      // L-System generation
      function generateLSystem(axiom, rules, iterations) {
        let str = axiom;
        const ruleMap = {};
        rules.split("\n").forEach((line) => {
          const [k, v] = line.split("=");
          if (k && v) ruleMap[k.trim()] = v.trim();
        });
        for (let i = 0; i < iterations; i++) {
          let next = "";
          for (let c of str) next += ruleMap[c] || c;
          str = next;
        }
        return str;
      }

      // Turtle graphics interpretation
      function interpretTurtle(lstring, angle) {
        const result = [];
        let x = 0,
          y = 0,
          ang = -90;
        const stack = [];
        let minX = 0,
          maxX = 0,
          minY = 0,
          maxY = 0;

        for (let c of lstring) {
          if (c === "F" || c === "G") {
            const rad = (ang * Math.PI) / 180;
            const nx = x + 10 * Math.cos(rad);
            const ny = y + 10 * Math.sin(rad);
            result.push({
              x1: x,
              y1: y,
              x2: nx,
              y2: ny,
              depth: stack.length,
              angle: ang,
            });
            x = nx;
            y = ny;
            minX = Math.min(minX, x);
            maxX = Math.max(maxX, x);
            minY = Math.min(minY, y);
            maxY = Math.max(maxY, y);
          } else if (c === "+") ang += angle;
          else if (c === "-") ang -= angle;
          else if (c === "[") stack.push({ x, y, ang });
          else if (c === "]") {
            if (stack.length > 0) {
              const s = stack.pop();
              x = s.x;
              y = s.y;
              ang = s.ang;
            }
          }
        }
        return { paths: result, bounds: { minX, maxX, minY, maxY } };
      }

      // Draw fractal with optional real-time highlighting
      function drawPaths(pathsData, bounds, highlightIndex = -1) {
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (pathsData.length === 0) return;

        const w = bounds.maxX - bounds.minX;
        const h = bounds.maxY - bounds.minY;
        if (w === 0 || h === 0) return;

        const padding = 50;
        const scale = Math.min(
          (canvas.width - padding * 2) / w,
          (canvas.height - padding * 2) / h,
        );
        const offsetX = canvas.width / 2 - (bounds.minX + w / 2) * scale;
        const offsetY = canvas.height / 2 - (bounds.minY + h / 2) * scale;
        const maxDepth = Math.max(...pathsData.map((p) => p.depth), 1);

        ctx.lineWidth = 2;
        ctx.lineCap = "round";

        const vizColor = document.getElementById("vizColor").value;

        // Draw all paths
        for (let i = 0; i < pathsData.length; i++) {
          const path = pathsData[i];
          const x1 = path.x1 * scale + offsetX;
          const y1 = path.y1 * scale + offsetY;
          const x2 = path.x2 * scale + offsetX;
          const y2 = path.y2 * scale + offsetY;

          let hue;
          if (vizColor === "depth") {
            hue = (path.depth / maxDepth) * 120 + 120;
          } else if (vizColor === "rainbow") {
            hue = (i / pathsData.length) * 360;
          } else {
            hue = 160; // Green theme
          }

          // Dim non-playing paths during playback
          const isPlaying = highlightIndex >= 0;
          const isCurrent = i === highlightIndex;
          const alpha = isPlaying && !isCurrent ? 0.25 : 1.0;

          ctx.strokeStyle = "hsla(" + hue + ", 100%, 50%, " + alpha + ")";
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();
        }

        // Highlight current playing segment
        if (highlightIndex >= 0 && highlightIndex < pathsData.length) {
          const path = pathsData[highlightIndex];
          const x1 = path.x1 * scale + offsetX;
          const y1 = path.y1 * scale + offsetY;
          const x2 = path.x2 * scale + offsetX;
          const y2 = path.y2 * scale + offsetY;

          // Draw thick glowing yellow line for current segment
          ctx.lineWidth = 8;
          ctx.strokeStyle = "rgba(255, 255, 0, 0.9)";
          ctx.shadowColor = "rgba(255, 255, 0, 0.8)";
          ctx.shadowBlur = 25;
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();
          ctx.shadowBlur = 0;

          // Draw red position marker circle at endpoint
          ctx.fillStyle = "rgba(255, 50, 50, 0.95)";
          ctx.shadowColor = "rgba(255, 50, 50, 0.9)";
          ctx.shadowBlur = 15;
          ctx.beginPath();
          ctx.arc(x2, y2, 6, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;

          // Draw parameter info overlay
          const pitchMapEl = document.getElementById("pitchMap");
          const attackMapEl = document.getElementById("attackMapEnv");
          const releaseMapEl = document.getElementById("releaseMapEnv");
          const presetEl = document.getElementById("soundPreset");

          const pitchMap = pitchMapEl ? pitchMapEl.value : "unknown";
          const attackMap = attackMapEl ? attackMapEl.value : "unknown";
          const releaseMap = releaseMapEl ? releaseMapEl.value : "unknown";
          const preset = presetEl
            ? presetEl.options[presetEl.selectedIndex].text
            : "unknown";

          // Semi-transparent info box
          ctx.fillStyle = "rgba(0, 0, 0, 0.85)";
          ctx.fillRect(10, 10, 320, 160);

          // Border
          ctx.strokeStyle = "rgba(0, 255, 136, 0.8)";
          ctx.lineWidth = 2;
          ctx.strokeRect(10, 10, 320, 160);

          // Text
          ctx.font = "bold 16px Rajdhani, sans-serif";
          ctx.fillStyle = "#00ff88";
          ctx.fillText(
            "CURRENT NOTE: " + (highlightIndex + 1) + " / " + pathsData.length,
            20,
            35,
          );

          ctx.font = "14px Rajdhani, sans-serif";
          ctx.fillStyle = "#ffffff";
          ctx.fillText("Depth: " + path.depth, 20, 60);
          ctx.fillText("Angle: " + path.angle.toFixed(1) + " deg", 20, 80);

          ctx.fillStyle = "#aaaaaa";
          ctx.fillText("Instrument: " + preset, 20, 105);
          ctx.fillText("Pitch Map: " + pitchMap, 20, 125);
          ctx.fillText("Attack Map: " + attackMap, 20, 145);
          ctx.fillText("Release Map: " + releaseMap, 20, 165);
        }
      }

      // Generate and visualize

        debugLog(

        // Read complex instrument mapping parameters
        const getSelectValue = (id, defaultVal = 0) => {
          const elem = document.getElementById(id);
          return elem ? elem.value : defaultVal;
        };

        // Granular parameters
        const grainDensityMap = getSelectValue("grainDensityMap", "constant");
        const grainSizeMap = getSelectValue("grainSizeMap", "constant");
        const grainPitchVarMap = getSelectValue("grainPitchVarMap", "none");
        const grainTextureMap = getSelectValue("grainTextureMap", "constant");

        // Complex FM parameters
        const fmAlgorithm = getSelectValue("fmAlgorithm", "parallel");
        const fmModIndexMap = getSelectValue("fmModIndexMap", "constant");
        const fmCarrierMap = getSelectValue("fmCarrierMap", "harmonic");
        const fmMixMap = getSelectValue("fmMixMap", "equal");

        // Noise & Filter parameters
        const noiseTypeMap = getSelectValue("noiseTypeMap", "white");
        const filterTypeMap = getSelectValue("filterTypeMap", "lowpass");
        const filterFreqMap = getSelectValue("filterFreqMap", "constant");
        const filterResMap = getSelectValue("filterResMap", "low");
        const filterModMap = getSelectValue("filterModMap", "none");

        if (instrNum > 1) {
          debugLog(
            `Complex instrument mappings loaded for instrument ${instrNum}`,
          );
        }

        const step = Math.max(1, Math.floor(paths.length / maxEvents));
        const selectedPaths = paths.filter((_, i) => i % step === 0);
        selectedPathsGlobal = selectedPaths; // Store for visualization

        const beatDur = 60 / tempo;
        let time = 0;
        const maxDepth = Math.max(...selectedPaths.map((p) => p.depth), 1);

        // Debug: show first few path depths and angles
        debugLog(
          `Total paths: ${paths.length}, Selected: ${selectedPaths.length}, MaxDepth: ${maxDepth}`,
        );
        if (selectedPaths.length > 0) {
          const sample = selectedPaths
            .slice(0, 5)
            .map((p) => `depth=${p.depth} angle=${p.angle.toFixed(1)}`)
            .join(", ");
          debugLog(`First 5 paths: ${sample}`);

          // Check if all depths are the same
          const uniqueDepths = new Set(selectedPaths.map((p) => p.depth));
          const uniqueAngles = new Set(
            selectedPaths.map((p) => Math.round(p.angle)),
          );
          debugLog(
            `Unique depths: ${uniqueDepths.size}, Unique angles: ${uniqueAngles.size}`,
          );
          if (uniqueDepths.size === 1) {
            debugLog(
              `⚠️ All paths have same depth=${[...uniqueDepths][0]} - use Position or Angle mapping`,
            );
          }
        }

        let randomPitch = 0;

        for (let i = 0; i < selectedPaths.length; i++) {
          const path = selectedPaths[i];
          let ratio = 1;

          // Pitch mapping
          if (pitchMap === "depth") {
            // Use depth modulo for repeating patterns
            ratio = Math.pow(2, (path.depth % 12) / 12);
          } else if (pitchMap === "angle") {
            // Map angle to full 2-octave range with more variation
            const normalizedAngle = ((path.angle + 180) % 360) / 360;
            ratio = Math.pow(2, normalizedAngle * 2 - 0.5);
          } else if (pitchMap === "position") {
            // Map position through sequence to 2-octave range
            const normPos = i / Math.max(selectedPaths.length - 1, 1);
            ratio = Math.pow(2, normPos * 2 - 0.5);
          } else if (pitchMap === "random") {
            // Random walk
            randomPitch += (Math.random() - 0.5) * 0.3;
            randomPitch = Math.max(-1, Math.min(1, randomPitch));
            ratio = Math.pow(2, randomPitch);
          }

          const freq = Math.max(100, Math.min(4000, baseFreq * ratio));

          // Duration mapping - make notes shorter than spacing to avoid clouds
          // Base duration is 80% of spacing so notes don't overlap too much
          const baseNoteDur = (beatDur / maxPoly) * 0.8;
          let dur = baseNoteDur;
          if (durMap === "depth") {
            dur = baseNoteDur * (0.5 + (path.depth / maxDepth) * 1.0);
          } else if (durMap === "inverse") {
            dur = baseNoteDur * (1.5 - (path.depth / maxDepth) * 0.5);
          }
          dur = Math.max(0.05, Math.min(2.0, dur));

          // Timbre mapping
          let brightness = 0.5;
          if (timbreMap === "depth") {
            brightness = Math.max(0.1, path.depth / maxDepth);
          } else if (timbreMap === "angle") {
            brightness = Math.max(0.1, ((path.angle + 180) % 360) / 360);
          }

          // Pan mapping
          let pan = 0.5; // center
          if (panMap === "depth") {
            pan = Math.max(0, Math.min(1, path.depth / maxDepth));
          } else if (panMap === "angle") {
            pan = ((path.angle + 180) % 360) / 360;
          } else if (panMap === "position") {
            pan = i / selectedPaths.length;
          }

          // Attack/Release mapping
          let noteAttack = -1; // -1 means use global (from slider)
          let noteRelease = -1; // -1 means use global (from slider)

          if (attackMap !== "manual") {
            // Map to range 0.001s - 1.0s based on fractal parameters
            let atkNorm = 0.5; // default middle
            if (attackMap === "depth") {
              atkNorm = path.depth / maxDepth;
            } else if (attackMap === "angle") {
              atkNorm = ((path.angle + 180) % 360) / 360;
            } else if (attackMap === "position") {
              atkNorm = i / Math.max(selectedPaths.length - 1, 1);
            } else if (attackMap === "inverse") {
              atkNorm = 1 - path.depth / maxDepth;
            }
            noteAttack = 0.001 + atkNorm * 0.999; // 1ms to 1000ms
          }

          if (releaseMap !== "manual") {
            // Map to range 0.01s - 2.0s based on fractal parameters
            let relNorm = 0.5; // default middle
            if (releaseMap === "depth") {
              relNorm = path.depth / maxDepth;
            } else if (releaseMap === "angle") {
              relNorm = ((path.angle + 180) % 360) / 360;
            } else if (releaseMap === "position") {
              relNorm = i / Math.max(selectedPaths.length - 1, 1);
            } else if (releaseMap === "inverse") {
              relNorm = 1 - path.depth / maxDepth;
            }
            noteRelease = 0.01 + relNorm * 1.99; // 10ms to 2000ms
          }

          // Calculate instrument-specific parameters
          let scoreEvent = "";

          if (instrNum === 1) {
            // Melodic instrument (original behavior)
            scoreEvent = `i 1 0 ${dur} ${freq} 0.3 ${presetNum} ${brightness} ${pan} ${panType} ${noteAttack} ${noteRelease}`;
          } else if (instrNum === 2) {
            // GRANULAR SYNTHESIS
            // p6=density, p7=grainSize, p8=pitchVar, p9=texture, p10=pan, p11=panType

            // Grain density (grains per second)
            let density = 20; // default
            if (grainDensityMap === "depth") {
              density = 10 + (path.depth / maxDepth) * 40; // 10-50 gr/sec
            } else if (grainDensityMap === "angle") {
              density = 10 + (((path.angle + 180) % 360) / 360) * 40;
            } else if (grainDensityMap === "position") {
              density = 10 + (i / selectedPaths.length) * 40;
            }

            // Grain size (duration in seconds)
            let grainSize = 0.05; // 50ms default
            if (grainSizeMap === "depth") {
              grainSize = 0.02 + (path.depth / maxDepth) * 0.15; // 20-170ms
            } else if (grainSizeMap === "angle") {
              grainSize = 0.02 + (((path.angle + 180) % 360) / 360) * 0.15;
            } else if (grainSizeMap === "inverse") {
              grainSize = 0.17 - (path.depth / maxDepth) * 0.15; // inverse
            }

            // Pitch variation (0-1)
            let pitchVar = 0;
            if (grainPitchVarMap === "depth") {
              pitchVar = (path.depth / maxDepth) * 0.5;
            } else if (grainPitchVarMap === "angle") {
              pitchVar = (((path.angle + 180) % 360) / 360) * 0.5;
            } else if (grainPitchVarMap === "random") {
              pitchVar = Math.random() * 0.5;
            }

            // Texture (noise mix 0-1)
            let texture = 0;
            if (grainTextureMap === "depth") {
              texture = (path.depth / maxDepth) * 0.7;
            } else if (grainTextureMap === "angle") {
              texture = (((path.angle + 180) % 360) / 360) * 0.7;
            }

            scoreEvent = `i 2 0 ${dur} ${freq} 0.3 ${density.toFixed(1)} ${grainSize.toFixed(4)} ${pitchVar.toFixed(3)} ${texture.toFixed(3)} ${pan} ${panType} ${noteAttack} ${noteRelease}`;
          } else if (instrNum === 3) {
            // COMPLEX FM
            // p6=modIndex, p7=algorithm, p8=carrierRatio, p9=opMix, p10=pan, p11=panType

            // Modulation index
            let modIndex = 2; // default
            if (fmModIndexMap === "depth") {
              modIndex = 0.5 + (path.depth / maxDepth) * 6; // 0.5-6.5
            } else if (fmModIndexMap === "angle") {
              modIndex = 0.5 + (((path.angle + 180) % 360) / 360) * 6;
            } else if (fmModIndexMap === "position") {
              modIndex = 0.5 + (i / selectedPaths.length) * 6;
            }

            // Algorithm (0-3)
            const algoMap = { parallel: 0, cascade: 1, stack: 2, complex: 3 };
            const algorithm = algoMap[fmAlgorithm] || 0;

            // Carrier ratio (harmonic shift)
            let carrierRatio = 1;
            if (fmCarrierMap === "harmonic") {
              carrierRatio = 1;
            } else if (fmCarrierMap === "depth") {
              carrierRatio = 1 + (path.depth / maxDepth) * 2; // 1-3
            } else if (fmCarrierMap === "angle") {
              carrierRatio = 1 + (((path.angle + 180) % 360) / 360) * 2;
            } else if (fmCarrierMap === "bells") {
              carrierRatio = 1; // bell ratios hardcoded in instrument
            }

            // Operator mix (0-1)
            let opMix = 0.5;
            if (fmMixMap === "equal") {
              opMix = 0.5;
            } else if (fmMixMap === "depth") {
              opMix = path.depth / maxDepth;
            } else if (fmMixMap === "angle") {
              opMix = ((path.angle + 180) % 360) / 360;
            }
            scoreEvent = `i 3 0 ${dur} ${freq} 0.3 ${modIndex.toFixed(2)} ${algorithm} ${carrierRatio.toFixed(3)} ${opMix.toFixed(3)} ${pan} ${panType} ${noteAttack} ${noteRelease}`;
          } else if (instrNum === 4) {
            // NOISE & FILTERS
            // p6=noiseColor, p7=filterType, p8=filterFreq, p9=resonance, p10=modRate, p11=pan, p12=panType

            // Noise color (0=white, 0.5=pink, 1=brown)
            let noiseColor = 0;
            if (noiseTypeMap === "white") {
              noiseColor = 0;
            } else if (noiseTypeMap === "depth") {
              noiseColor = path.depth / maxDepth;
            } else if (noiseTypeMap === "angle") {
              noiseColor = ((path.angle + 180) % 360) / 360;
            }

            // Filter type (0=LP, 1=BP, 2=HP)
            let filterType = 0;
            if (filterTypeMap === "lowpass") {
              filterType = 0;
            } else if (filterTypeMap === "depth") {
              filterType = Math.floor((path.depth / maxDepth) * 3);
            } else if (filterTypeMap === "angle") {
              filterType = Math.floor((((path.angle + 180) % 360) / 360) * 3);
            } else if (filterTypeMap === "cycle") {
              filterType = i % 3;
            }
            filterType = Math.min(2, filterType);

            // Filter frequency
            let filterFreq = 1000;
            if (filterFreqMap === "constant") {
              filterFreq = 1000;
            } else if (filterFreqMap === "depth") {
              filterFreq = 200 + (path.depth / maxDepth) * 3800; // 200-4000 Hz
            } else if (filterFreqMap === "angle") {
              filterFreq = 200 + (((path.angle + 180) % 360) / 360) * 3800;
            } else if (filterFreqMap === "position") {
              filterFreq = 200 + (i / selectedPaths.length) * 3800;
            }

            // Resonance (Q factor 0.5-5 SAFE range)
            let resonance = 0.5;
            if (filterResMap === "low") {
              resonance = 0.5;
            } else if (filterResMap === "depth") {
              resonance = 0.5 + (path.depth / maxDepth) * 4.5; // 0.5-5
            } else if (filterResMap === "angle") {
              resonance = 0.5 + (((path.angle + 180) % 360) / 360) * 4.5;
            } else if (filterResMap === "high") {
              resonance = 5;
            }

            // Filter modulation rate (LFO Hz)
            let modRate = 0;
            if (filterModMap === "none") {
              modRate = 0;
            } else if (filterModMap === "depth") {
              modRate = 0.1 + (path.depth / maxDepth) * 9.9; // 0.1-10 Hz
            } else if (filterModMap === "angle") {
              modRate = 0.1 + (((path.angle + 180) % 360) / 360) * 9.9;
            } else if (filterModMap === "fast") {
              modRate = 10;
            }

            // Clamp all values to safe ranges (resonance kept LOW to prevent filter explosion)
            filterFreq = Math.max(80, Math.min(8000, filterFreq));
            resonance = Math.max(0.5, Math.min(5, resonance)); // Max Q=5 to prevent blowup
            modRate = Math.max(0, Math.min(5, modRate)); // Max 5Hz LFO

            scoreEvent = `i 4 0 ${dur} ${freq} 0.3 ${noiseColor.toFixed(3)} ${filterType} ${filterFreq.toFixed(1)} ${resonance.toFixed(2)} ${modRate.toFixed(2)} ${pan} ${panType} ${noteAttack} ${noteRelease}`;
          }

          if (i < 3) {
            const panTypeLabel = panType === 0 ? "Stereo" : "Ambisonic";
            debugLog(`Event ${i}: ${scoreEvent} [${panTypeLabel}]`);
          }

          // Schedule note via JavaScript setTimeout (allows cancellation)
          const noteTime = time * 1000; // Convert to milliseconds
          const noteIdx = i; // Capture for closure
          const pathData = path; // Capture path data for reverb mapping
          const timeoutId = setTimeout(async () => {
            if (isPlaying && csound && csoundReady) {
              csound.inputMessage(scoreEvent);

              logEventToCSD(scoreEvent, time);  // Log for CSD export
              // Update reverb parameters (ALWAYS set channels, even in manual mode)
              let roomNorm = roomSize; // Start with slider value
              if (roomSizeMap === "depth") {
                roomNorm = pathData.depth / maxDepth;
              } else if (roomSizeMap === "angle") {
                roomNorm = ((pathData.angle + 180) % 360) / 360;
              } else if (roomSizeMap === "position") {
                roomNorm = noteIdx / Math.max(selectedPaths.length - 1, 1);
              } else if (roomSizeMap === "inverse") {
                roomNorm = 1 - pathData.depth / maxDepth;
              }
              await csound.setControlChannel(
                "roomSize",
                Math.max(0, Math.min(1, roomNorm)),
              );

              let wetNorm = reverbWet; // Start with slider value
              if (reverbWetMap === "depth") {
                wetNorm = pathData.depth / maxDepth;
              } else if (reverbWetMap === "angle") {
                wetNorm = ((pathData.angle + 180) % 360) / 360;
              } else if (reverbWetMap === "position") {
                wetNorm = noteIdx / Math.max(selectedPaths.length - 1, 1);
              } else if (reverbWetMap === "inverse") {
                wetNorm = 1 - pathData.depth / maxDepth;
              }
              await csound.setControlChannel(
                "reverbWet",
                Math.max(0, Math.min(1, wetNorm)),
              );

              // Update visualization
              currentNoteIndex = noteIdx;
              drawPaths(selectedPathsGlobal, paths.bounds, noteIdx);
            }
          }, noteTime);

          scheduledTimeouts.push(timeoutId);

          // Calculate time increment based on tempo and polyphony
          const spacing = beatDur / maxPoly;
          time += spacing;
        }

        debugLog(
          `=== Scheduled ${selectedPaths.length} JavaScript timeouts, total duration: ${time.toFixed(2)}s ===`,
        );

        // Store timeout ID so we can cancel it
        playbackTimeoutId = setTimeout(
          () => {
            isPlaying = false;
            currentNoteIndex = -1;
            document.getElementById("playBtn").disabled = false;
            document.getElementById("status").textContent =
              "Ready - " + selectedPaths.length + " events played";
            playbackTimeoutId = null;
            // Clear visualization highlighting
            if (paths.length > 0 && paths.bounds) {
              drawPaths(paths, paths.bounds, -1);
            }
          },
          (time + 2) * 1000,
        );
      };

      // Test sound - play a single 440Hz sine tone
      // Stop - immediately kill all active notes and clear scheduled timeouts
      window.stop = async function () {
        debugLog("Stop clicked - clearing all scheduled notes");

        // Clear playback end timeout
        if (playbackTimeoutId) {
          clearTimeout(playbackTimeoutId);
          playbackTimeoutId = null;
        }

        // Clear all scheduled note timeouts
        scheduledTimeouts.forEach((id) => clearTimeout(id));
        scheduledTimeouts = [];
        debugLog(`✓ Cleared ${scheduledTimeouts.length} scheduled timeouts`);

        // Kill all active notes using stop flag
        if (csound && csoundReady) {
          try {
            await csound.setControlChannel("stopAll", 1);
            debugLog("✓ Stop flag set - active notes terminating");
          } catch (err) {
            debugLog(`✗ Stop error: ${err.message}`);
          }
        }

        isPlaying = false;
        currentNoteIndex = -1;
        document.getElementById("playBtn").disabled = false;
        document.getElementById("status").textContent = "Stopped";

        // Clear visualization highlighting
        if (paths.length > 0 && paths.bounds) {
          drawPaths(paths, paths.bounds, -1);
        }
      };

      function refreshPresetList() {
        const select = document.getElementById("presetList");
        const presets = JSON.parse(
          localStorage.getItem("fractalPresets") || "{}",
        );
        const names = Object.keys(presets).sort();

        select.innerHTML = "";
        if (names.length === 0) {
          const opt = document.createElement("option");
          opt.value = "none";
          opt.disabled = true;
          opt.textContent = "No presets saved yet";
          opt.style.color = "var(--text-dim)";
          select.appendChild(opt);
        } else {
          names.forEach((name) => {
            const opt = document.createElement("option");
            opt.value = name;
            opt.textContent = name;
            select.appendChild(opt);
          });
        }
      }

      // Load factory presets into localStorage (force=true to overwrite)
      function loadFactoryPresets(force = false) {
        const existingPresets = JSON.parse(
          localStorage.getItem("fractalPresets") || "{}",
        );
        let addedCount = 0;
        let updatedCount = 0;

        Object.entries(factoryPresets).forEach(([name, preset]) => {
          if (!existingPresets[name]) {
            existingPresets[name] = preset;
            addedCount++;
          } else if (force) {
            existingPresets[name] = preset;
            updatedCount++;
          }
        });

        if (addedCount > 0 || updatedCount > 0) {
          localStorage.setItem(
            "fractalPresets",
            JSON.stringify(existingPresets),
          );
          if (force && updatedCount > 0) {
            debugLog(`✓ Reloaded ${updatedCount} factory presets (forced)`);
          }
          if (addedCount > 0) {
            debugLog(`✓ Added ${addedCount} new factory presets`);
          }
        } else {
          debugLog(`Factory presets already loaded (39 total)`);
        }
      // ========================================
      // CSD EXPORT FUNCTIONALITY
      // ========================================

      let csdEventLog = [];
      let isCSDRecording = false;

      window.initializeCSDRecording = function() {
        csdEventLog = [];
        isCSDRecording = true;
      };

      window.logEventToCSD = function(scoreEvent, time) {
        if (isCSDRecording) {
          csdEventLog.push({ statement: scoreEvent, timestamp: time });
        }
      };

      window.enableCSDExport = function() {
        const btn = document.getElementById("exportCsdBtn");
        if (btn) btn.disabled = false;
      };

      window.exportCSD = async function() {
        console.log("exportCSD called");
        
        if (csdEventLog.length === 0) {
          alert('No events recorded. Generate and play a fractal first!');
          return;
        }

        try {
          const lsystemParams = {
            axiom: document.getElementById("axiom")?.value || "?",
            rules: document.getElementById("rules")?.value || "?",
            iterations: parseFloat(document.getElementById("iterations")?.value) || 0,
            angle: parseFloat(document.getElementById("angle")?.value) || 0,
            baseFreq: parseFloat(document.getElementById("basefreq")?.value) || 220,
            tempo: parseFloat(document.getElementById("tempo")?.value) || 120,
            pitchMap: document.getElementById("pitchmap")?.value || "depth",
            durMap: document.getElementById("durmap")?.value || "constant",
            presetMode: document.getElementById("presetmode")?.value || "warm_pad",
          };

          const timestamp = new Date().toISOString();
          const orchCode = typeof orchestraCode !== 'undefined' ? orchestraCode : getDefaultOrchestra();
          
          const csdHeader = `<CsoundSynthesizer>
<CsOptions>
-odac -d -m0
</CsOptions>
<CsInstruments>
${orchCode}
</CsInstruments>
<CsScore>
; ============================================================
; FRACTAL EXPLORER - L-SYSTEM GENERATED COMPOSITION
; ============================================================
; Generated: ${timestamp}
;
; L-System Configuration:
;   Axiom: ${lsystemParams.axiom}
;   Rules: ${lsystemParams.rules.replace(/\n/g, ' | ')}
;   Iterations: ${lsystemParams.iterations}
;   Angle: ${lsystemParams.angle}°
;
; Musical Parameters:
;   Base Frequency: ${lsystemParams.baseFreq} Hz
;   Tempo: ${lsystemParams.tempo} BPM
;   Pitch Mapping: ${lsystemParams.pitchMap}
;   Duration Mapping: ${lsystemParams.durMap}
;   Synthesis Preset: ${lsystemParams.presetMode}
;
; Score Statistics:
;   Total Events: ${csdEventLog.length}
;   Duration: ${(csdEventLog[csdEventLog.length - 1]?.timestamp || 0).toFixed(3)}s
; ============================================================

`;

          let scoreStatements = '';
          csdEventLog.forEach(event => {
            scoreStatements += event.statement + '\n';
          });

          const csdFooter = `\ne\n</CsScore>\n</CsoundSynthesizer>`;
          const fullCSD = csdHeader + scoreStatements + csdFooter;

          // Display in textarea (create if needed)
          let output = document.getElementById('csdOutput');
          if (!output) {
            console.warn('Creating textarea element...');
            output = document.createElement('textarea');
            output.id = 'csdOutput';
            output.readOnly = true;
            output.style.cssText = 'position: fixed; bottom: 20px; right: 20px; width: 600px; height: 450px; background: rgba(10, 10, 30, 0.95); color: #00ff88; border: 2px solid #00ff88; border-radius: 8px; padding: 15px; font-family: "Monaco", monospace; font-size: 11px; resize: both; overflow: auto; z-index: 1000; box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);';
            document.body.appendChild(output);
          }
          
          output.value = fullCSD;
          output.style.display = 'block';
          
          console.log('✓ CSD content displayed in console');
          console.log(`✓ Generated ${csdEventLog.length} events`);

          downloadCSDFile(fullCSD);

        } catch (error) {
          console.error('Export error:', error);
          alert('Error exporting CSD: ' + error.message);
        }
      };

      function downloadCSDFile(content) {
        try {
          const timestamp = new Date().toISOString().replace(/:/g, '-').split('.')[0];
          const filename = `fractal-explorer_${timestamp}.csd`;

          const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = url;
          link.download = filename;
          
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          
          setTimeout(() => URL.revokeObjectURL(url), 100);

          document.getElementById('status').textContent = `✓ Exported: ${filename}`;
          debugLog(`✓ Downloaded: ${filename}`);
          console.log(`✓ File downloaded: ${filename}`);
          
        } catch (error) {
          console.error('Download error:', error);
          alert('Error downloading file: ' + error.message);
        }
      }
      };

      }

      // Make functions global
      window.savePreset = savePreset;
      window.loadSavedPreset = loadSavedPreset;
      window.deletePreset = deletePreset;
      window.loadFactoryPresets = loadFactoryPresets;

      // Initialize
      window.addEventListener("DOMContentLoaded", async () => {
        updateDisplays();
        loadFactoryPresets(); // Load 39 factory presets on first run
        refreshPresetList(); // Load saved presets list
        await initCsound();
        setTimeout(() => loadPreset("algae"), 100);
      });
